# Posiflex touch calibration (from T1 @ 192.168.1.11).
# T1 maps IRTOUCH to LVDS1 via ~/.profile; T3 also has USB TOUCH V380 on the operator panel.
# Install: sudo install -m 644 99-touchscreen-matrix.conf /etc/X11/xorg.conf.d/
# Log out/in after install.
Section "InputClass"
    Identifier "IRTOUCH calibration matrix"
    MatchProduct "IRTOUCH"
    Driver "libinput"
    Option "CalibrationMatrix" "-1 0 1 0 -1 1 0 0 1"
EndSection

Section "InputClass"
    Identifier "Posiflex USB touch calibration matrix"
    MatchProduct "USB TOUCH V380"
    Driver "libinput"
    Option "CalibrationMatrix" "-1 0 1 0 -1 1 0 0 1"
EndSection
